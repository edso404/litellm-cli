name: Build

on:
  push:
    tags: ["v*"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true
      - run: go test -v -race ./...
        env:
          TZ: Asia/Shanghai

  build:
    name: Build
    needs: [test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true
      - name: Build
        run: |
          EXTENSION=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXTENSION=".exe"
          fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w" \
            -o "litellm-cli-${{ matrix.goos }}-${{ matrix.goarch }}${EXTENSION}" .
      - uses: actions/upload-artifact@v7
        with:
          name: litellm-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          path: litellm-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          if-no-files-found: error

  release:
    name: Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd release
          sha256sum litellm-cli-* > checksums.txt
      - uses: softprops/action-gh-release@v3
        with:
          files: release/*
          body_path: CHANGELOG.md
          draft: true
